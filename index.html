<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Tools - PDF, Password Generator, URL Checker & More</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="container">
            <h1>🛠️ Online Tools</h1>
            <p class="subtitle">Free online tools for PDF, passwords, URLs, and more</p>
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="Search tools..." onkeyup="filterTools()">
                <select id="categoryFilter" onchange="filterTools()">
                    <option value="">All Categories</option>
                </select>
                <div id="tagFilters" class="tag-filters"></div>
            </div>
        </div>
    </header>

    <main class="container">
        <div id="toolsGrid" class="tools-grid"></div>
        
        <!-- Tool Modals -->
        <div id="toolModal" class="modal">
            <div class="modal-content">
                <span class="close" onclick="closeModal()">&times;</span>
                <h2 id="modalTitle"></h2>
                <div id="modalContent"></div>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>Easy to add more tools! Check the tools.js file to extend functionality.</p>
        </div>
    </footer>

    <script src="tools.js"></script>
    <script src="app.js"></script>
</body>
</html>
