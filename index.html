<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Tools - PDF, Password Generator, URL Checker & More</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="container">
            <h1>🛠️ Online Tools</h1>
            <p class="subtitle">Free online tools for PDF, passwords, URLs, and more</p>
            
            <div class="search-container">
                <input type="text" id="search-input" placeholder="Search tools...">
                <div id="category-filters" class="category-filters"></div>
                <div id="tag-filters" class="tag-filters"></div>
                <div id="results-count" class="results-count"></div>
            </div>
        </div>
    </header>

    <main class="container">
        <div id="tools-grid" class="tools-grid"></div>
        
        <!-- Tool Modal -->
        <div id="tool-modal" class="modal">
            <div class="modal-content">
                <div id="modal-content"></div>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>Easy to add more tools! Follow the MVC pattern in models/, views/, controllers/.</p>
            <button onclick="runAllTests()" style="margin-top:10px; padding:5px 10px; cursor:pointer;">Run Tests</button>
            <pre id="test-results" style="background:#f4f4f4; padding:10px; margin-top:10px; display:none;"></pre>
        </div>
    </footer>

    <!-- MVC Architecture -->
    <script src="models/tool-models.js"></script>
    <script src="views/tool-view.js"></script>
    <script src="controllers/tool-controller.js"></script>
    
    <!-- Legacy support -->
    <script src="pdf-lib.esm.min.js"></script>
    <script src="tools.js"></script>
    <script src="app.js"></script>
    
    <!-- Unit Tests -->
    <script src="tests/unit-tests.js"></script>
</body>
</html>
